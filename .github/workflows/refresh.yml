name: Refresh HubSpot call activity

on:
  schedule:
    # 00:00 GMT (UTC) daily. UK is on GMT in winter and BST (UTC+1) in summer,
    # so during BST this fires at 01:00 local. Sticking to GMT keeps it simple.
    - cron: "0 0 * * *"
  workflow_dispatch: {}       # allow manual "Run workflow" in the Actions tab
  push:
    branches: [ main ]        # also refresh on pushes to main (optional)

permissions:
  contents: write              # needed so the job can commit the refreshed data.json

concurrency:
  group: refresh
  cancel-in-progress: false

# Opt into Node.js 24 runners ahead of GitHub's June 2026 deprecation of Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch HubSpot data
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          LOOKBACK_DAYS: "420"
          TIMEZONE: "Europe/London"
          # Comma-separated HubSpot owner full names to include. Must match the
          # owner's "First Last" exactly as it appears in /crm/v3/owners.
          REP_NAMES: "Tyreek Burke,Jennifer Fasida,Liam Bolger-Prentice,Zoe Cornelius,Miles Smith,George Watson,Henry McCloskey,Hamid Abusibah,Nathan Brown,Darien Bryan"
        run: python scripts/fetch_hubspot.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git pull origin main --no-rebase -X theirs || true
            git add data/data.json
            git commit -m "chore: refresh HubSpot call activity ($(date -u +%Y-%m-%d))"
            git push
          fi
